
########################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
########################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning

# Force 165 Hz for this monitor; use preferred settings elsewhere.
monitor = desc:Samsung Electric Company LC34G55T H1AK500000, 3440x1440@165, 0x0, 1
monitor = , preferred, auto, 1

# autostart
exec-once = /home/ost/scripts/pipewire.sh
#exec-once = pipewire
#exec-once = pipewire-pulse
#exec-once = wireplumber
exec-once = waybar
exec-once = blueman-applet
exec-once = dunst #notificationi
exec-once = nm-applet --indicator
exec-once = hyprpaper
exec-once = hyprctl setcursor Hyprcursor 24


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = WLR_NO_HARDWARE_CURSORS,1
#env = XKB_DEFAULT_OPTIONS=caps:swapescape

#tearing
# env = WLR_DRM_NO_ATOMIC,1

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = se, se#, us,
    kb_variant = nodeadkeys,dvorak#, dvp
    kb_model =
    kb_options = caps:swapescape, compose:menu
    #kb_options = #grp:caps_toggle
    kb_rules =
    accel_profile = flat
    repeat_delay = 125
    repeat_rate = 100

    follow_mouse = 2
    float_switch_override_focus = 0

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

cursor {
    no_hardware_cursors = true
    # allow_dumb_copy = true
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = 0
    border_size = 0#2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(59595955)

    # layout = scrolling
    layout = dwindle
    # layout = master
    # layout = hy3
    

    allow_tearing = true
}

master {
    new_status = slave
    orientation = center
    slave_count_for_center_master = 2
    # new_is_master = false
    # allow_small_split = true
    # special_scale_factor = .80
    mfact = .34
    # orientation = center
    # inherit_fullscreen = false
    # always_center_master = false
}

env = WLR_DRM_NO_ATOMIC, 1

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0#10
    
    blur {
        enabled = false
        size = 5
        passes = 2
        # blurls = waybar
        noise = 0.15
    }
    active_opacity = 1.0
    # inactive_opacity = 0.95#0.7895
    dim_inactive = true
    dim_strength = 0.1

    # drop_shadow = no#yes
    # shadow_range = 4
    # shadow_render_power = 3
    # col.shadow = rgba(000000ae)#(1a1a1aee)
}

animations {
    enabled = no

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 4, myBezier
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 5, default
    animation = borderangle, 1, 4, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    # pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    # default_split_ratio = 0.75
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
    #allow_small_split = true
}

scrolling {
    # fullscreen_on_one_column = true
    # column_width = 0.33
    # direction = right
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    # workspace_swipe = off
}

misc {
    disable_hyprland_logo = true
    vrr = 0
}

plugin {
    hy3 {
        autotile {
            enable = true
            # trigger_height = -1
            trigger_width = -1
        }
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic-mouse-v1 {
    # sensitivity = -0.5
# }

# Window rules
windowrule = match:class ^(kitty)$, float on
windowrule = match:class ^(alacritty)$, float on
windowrule = match:class ^(foot)$, float on
windowrule = match:class ^(thunar)$, float on
windowrule = match:class ^(mousepad)$, float on
windowrule = match:class ^(leafpad)$, float on
# windowrule = match:class ^(.*dev3.*)$, float on
# windowrule = match:class ^(.*dig.*)$, float on, immediate yes
# windowrule = match:class ^(.*odin.*)$, float on
# windowrule = match:class ^(.*kitty.*)$, float on
windowrule = match:class ^(.*pavucontrol.*)$, float on
windowrule = match:class ^(.*pavucontrol.*)$, move 80% 34
windowrule = match:class ^(.*pavucontrol.*)$, size 20% 50%

# windowrule = match:class ^(blueman-.*manager.*)$, float on
# windowrule = match:class ^(blueman-.*manager.*)$, move 80% 34
# windowrule = match:class ^(blueman-.*manager.*)$, size 20% 50%

# windowrule = match:class ^(Overwatch..*exe.*)$, immediate yes
windowrule = match:class (.*), immediate yes

# windowrule = match:class ^(Overwatch..*exe.*)$, size 20% 50%
# windowrule = match:class ^(Overwatch..*exe.*)$, move 80% 34

# windowrule = match:class ^(kitty)$, match:title ^(kitty)$, float on
# See https://wiki.hypr.land/Configuring/Window-Rules/ for more


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
#$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = SUPER, Return , exec, foot#kitty
bind = SUPER, C, centerwindow
bind = SUPER, Q, killactive, 
bind = SUPER SHIFT, E, exit, 
bind = SUPER, E, exec, wlogout
#bind = SUPER, E, exec, thunar
bind = SUPER, D, exec, thunar
bind = SUPER, V, togglefloating, 
#bind = SUPER, d, exec, wofi --show drun
bind = SUPER, space, exec, wofi --show drun
bind = SUPER, P, pseudo, # dwindle
bind = SUPER, J, layoutmsg, togglesplit, # dwindle
bind = SUPER, F, fullscreen
bind = SUPER, tab, cyclenext

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

bind = SUPER SHIFT, left, swapwindow, l
bind = SUPER SHIFT, right, swapwindow, r
bind = SUPER SHIFT, up, swapwindow, u
bind = SUPER SHIFT, down, swapwindow, d

bind = SUPER CTRL, left, movewindow, l
bind = SUPER CTRL, right, movewindow, r
bind = SUPER CTRL, up, movewindow, u
bind = SUPER CTRL, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, grim - | wl-copy

#switch keyboard layout
bind = SUPER, backspace, exec, hyprctl switchxkblayout logitech-usb-receiver-keyboard next
#bind = SUPER, N, exec, thunar

# Multimedia-keys
bind = , XF86AudioRaiseVolume, exec, sh -c "pactl set-sink-mute 0 false; pactl set-sink-volume 0 +5%"
bind = , XF86AudioLowerVolume, exec, sh -c "pactl set-sink-mute 0 false; pactl set-sink-volume 0 -5%"
bind = , XF86AudioMute, exec, pactl set-sink-mute 0 toggle
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPlay, exec, playerctl play-pause

exec-once = foot
